    <script>
        // Start Sorting
        function showMenu(menuId, element) {
            document.querySelectorAll('.menu-content').forEach(menu => {
                menu.classList.add('d-none');
            });

            document.getElementById(menuId).classList.remove('d-none');

            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
            });

            element.classList.add('active');
        }

        function ipToNumber(ip) {
            return ip.split('.').reduce((acc, octet) => {
                return (acc << 8) + parseInt(octet, 10);
            }, 0) >>> 0;
        }

        function numberToIp(num) {
            return [
                (num >>> 24) & 255,
                (num >>> 16) & 255,
                (num >>> 8) & 255,
                num & 255
            ].join('.');
        }

        function isValidIP(ip) {
            const parts = ip.split('.');

            if (parts.length !== 4) return false;

            return parts.every(part => {
                const num = Number(part);
                return part !== '' && num >= 0 && num <= 255;
            });
        }

        function isValidCIDR(cidr) {
            const parts = cidr.split('/');

            if (parts.length !== 2) return false;

            const ip = parts[0];
            const prefix = Number(parts[1]);

            return isValidIP(ip) && !isNaN(prefix) && prefix >= 0 && prefix <= 32;
        }

        function getSortValue(item) {
            if (item.includes('/')) {
                return ipToNumber(item.split('/')[0]);
            }

            if (item.includes('-')) {
                return ipToNumber(item.split('-')[0].trim());
            }

            return ipToNumber(item);
        }

        function formatRange(start, end) {
            if (start === end) {
                return numberToIp(start);
            }

            return `${numberToIp(start)}-${numberToIp(end)}`;
        }

        function processIP() {
            const input = document.getElementById("inputIP").value;

            const lines = input
                .split(/\r?\n|,/)
                .map(item => item.trim())
                .filter(item => item !== '');

            const ipSet = new Set();
            const cidrSet = new Set();

            for (const line of lines) {
                if (line.includes('/')) {
                    if (isValidCIDR(line)) {
                        cidrSet.add(line);
                    }
                    continue;
                }

                if (line.includes('-')) {
                    const rangeParts = line.split('-');

                    if (rangeParts.length !== 2) continue;

                    const startIP = rangeParts[0].trim();
                    const endIP = rangeParts[1].trim();

                    if (!isValidIP(startIP) || !isValidIP(endIP)) continue;

                    let start = ipToNumber(startIP);
                    let end = ipToNumber(endIP);

                    if (start > end) {
                        [start, end] = [end, start];
                    }

                    for (let i = start; i <= end; i++) {
                        ipSet.add(i);
                    }

                    continue;
                }

                if (isValidIP(line)) {
                    ipSet.add(ipToNumber(line));
                }
            }

            const sortedIPs = [...ipSet].sort((a, b) => a - b);
            const mergedIPs = [];

            if (sortedIPs.length > 0) {
                let start = sortedIPs[0];
                let end = sortedIPs[0];

                for (let i = 1; i < sortedIPs.length; i++) {
                    if (sortedIPs[i] === end + 1) {
                        end = sortedIPs[i];
                    } else {
                        mergedIPs.push(formatRange(start, end));
                        start = sortedIPs[i];
                        end = sortedIPs[i];
                    }
                }

                mergedIPs.push(formatRange(start, end));
            }

            const finalResult = [
                ...cidrSet,
                ...mergedIPs
            ].sort((a, b) => getSortValue(a) - getSortValue(b));

            document.getElementById("outputIP").value = finalResult.join('\n');
        }

        function copyOutput(button) {

            const output =
                document.getElementById("outputIP");

            if (!output.value.trim()) {
                return;
            }

            navigator.clipboard.writeText(output.value);

            showCopied(button, "Copy Output");
        }

        function clearAll() {
            document.getElementById("inputIP").value = "";
            document.getElementById("outputIP").value = "";
        }
        // End Sorting


        // Start Block IP
        function isDomain(value) {
            const domainRegex = /^(?!:\/\/)([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}$/;
            return domainRegex.test(value);
        }

        function generateBlockIP() {
            const input = document.getElementById("blockInput").value;
            const groupName = document.getElementById("groupAddress").value.trim();

            if (!groupName) {
                alert("Group Address wajib diisi.");
                return;
            }

            const lines = input
                .split(/\r?\n|,/)
                .map(item => item.trim())
                .filter(item => item !== "");

            const uniqueItems = [...new Set(lines)];

            const ipList = [];
            const domainList = [];

            uniqueItems.forEach(item => {
                if (isValidIP(item)) {
                    ipList.push(item);
                } else if (isDomain(item)) {
                    domainList.push(item.toLowerCase());
                }
            });

            ipList.sort((a, b) => ipToNumber(a) - ipToNumber(b));
            domainList.sort();

            let fortiOutput = "";
            let checkpointOutput = "";

            fortiOutput += "config firewall address\n";

            domainList.forEach(domain => {
                fortiOutput += `    edit ${domain}\n`;
                fortiOutput += `        set type fqdn\n`;
                fortiOutput += `        set fqdn ${domain}\n`;
                fortiOutput += `    next\n`;
            });

            ipList.forEach(ip => {
                fortiOutput += `    edit Block_${ip}\n`;
                fortiOutput += `        set subnet ${ip} 255.255.255.255\n`;
                fortiOutput += `    next\n`;
            });

            fortiOutput += "end\n\n";

            fortiOutput += "config firewall addrgrp\n";
            fortiOutput += `    edit ${groupName}\n`;

            domainList.forEach(domain => {
                fortiOutput += `        append member ${domain}\n`;
            });

            ipList.forEach(ip => {
                fortiOutput += `        append member Block_${ip}\n`;
            });

            fortiOutput += "    next\n";
            fortiOutput += "end";

            checkpointOutput += `add group name "${groupName}"\n`;

            domainList.forEach(domain => {
                checkpointOutput += `add dns-domain name ".${domain}" is-sub-domain false\n`;
                checkpointOutput += `set group name "${groupName}" members.add ".${domain}"\n`;
            });

            ipList.forEach(ip => {
                checkpointOutput += `add host name "Block_${ip}" ip-address ${ip} groups ${groupName}\n`;
            });

            document.getElementById("fortiOutput").value = fortiOutput;
            document.getElementById("checkpointOutput").value = checkpointOutput;
        }

        function copyFortiOutput(button) {

            const output =
                document.getElementById("fortiOutput");

            if (!output.value.trim()) {
                return;
            }

            navigator.clipboard.writeText(output.value);

            showCopied(button, "Copy Forti");
        }

function copyCheckpointOutput(button) {

    const output =
        document.getElementById("checkpointOutput");

    if (!output.value.trim()) {
        return;
    }

    navigator.clipboard.writeText(output.value);

    showCopied(button, "Copy Check Point");
}

        function clearBlock() {
            document.getElementById("blockInput").value = "";
            document.getElementById("groupAddress").value = "";
            document.getElementById("fortiOutput").value = "";
            document.getElementById("checkpointOutput").value = "";
        }
        // End Block IP

        // Start Create Object Forti
        function prefixToSubnetMask(prefix) {
            prefix = Number(prefix);

            if (prefix < 0 || prefix > 32 || isNaN(prefix)) {
                return null;
            }

            let mask = [];

            for (let i = 0; i < 4; i++) {
                const bits = Math.min(8, prefix);
                mask.push(256 - Math.pow(2, 8 - bits));
                prefix -= bits;
            }

            return mask.join('.');
        }

        function generateFortiObject() {
            const input = document.getElementById("fortiInput").value;
            const groupName = document.getElementById("fortiGroupAddress").value.trim();
            const hostnameFormat = document.getElementById("fortiHostnameFormat").value.trim();

            if (!groupName) {
                alert("Group Address wajib diisi.");
                return;
            }

            if (!hostnameFormat) {
                alert("Format Hostname wajib diisi. Contoh: H_");
                return;
            }

            const lines = input
                .split(/\r?\n|,/)
                .map(item => item.trim())
                .filter(item => item !== "");

            const uniqueItems = [...new Set(lines)];

            const ipList = [];
            const cidrList = [];
            const domainList = [];

            uniqueItems.forEach(item => {
                if (isValidCIDR(item)) {
                    cidrList.push(item);
                } else if (isValidIP(item)) {
                    ipList.push(item);
                } else if (isDomain(item)) {
                    domainList.push(item.toLowerCase());
                }
            });

            cidrList.sort((a, b) => {
                const ipA = a.split('/')[0];
                const ipB = b.split('/')[0];
                return ipToNumber(ipA) - ipToNumber(ipB);
            });

            ipList.sort((a, b) => ipToNumber(a) - ipToNumber(b));
            domainList.sort();

            const members = [];
            let output = "";

            output += "config firewall address\n";

            domainList.forEach(domain => {
                members.push(domain);

                output += `    edit ${domain}\n`;
                output += `        set type fqdn\n`;
                output += `        set fqdn ${domain}\n`;
                output += `    next\n`;
            });

            cidrList.forEach(cidr => {
                const [ip, prefix] = cidr.split('/');
                const subnetMask = prefixToSubnetMask(prefix);
                const objectName = `${hostnameFormat}${ip}-m${prefix}`;

                members.push(objectName);

                output += `    edit ${objectName}\n`;
                output += `        set subnet ${ip} ${subnetMask}\n`;
                output += `    next\n`;
            });

            ipList.forEach(ip => {

                const objectName = `${hostnameFormat}${ip}-m32`;

                members.push(objectName);

                output += `    edit ${objectName}\n`;
                output += `        set subnet ${ip} 255.255.255.255\n`;
                output += `    next\n`;
            });

            output += "end\n\n";

            output += "config firewall addrgrp\n";
            output += `    edit ${groupName}\n`;

            members.forEach(member => {
                output += `        append member ${member}\n`;
            });

            output += "    next\n";
            output += "end";

            document.getElementById("fortiObjectOutput").value = output;
        }

function copyFortiObjectOutput(button) {

    const output =
        document.getElementById("fortiObjectOutput");

    if (!output.value.trim()) {
        return;
    }

    navigator.clipboard.writeText(output.value);

    showCopied(button, "Copy Output");
}

        function clearFortiObject() {
            document.getElementById("fortiInput").value = "";
            document.getElementById("fortiGroupAddress").value = "";
            document.getElementById("fortiHostnameFormat").value = "";
            document.getElementById("fortiObjectOutput").value = "";
        }
        // End Create Object Forti


        // Start Create Object Checkpoint
        function generateCheckpointObject() {
            const input = document.getElementById("checkpointInput").value;
            const groupName = document.getElementById("checkpointGroupAddress").value.trim();
            const hostnameFormat = document.getElementById("checkpointHostnameFormat").value.trim();

            if (!groupName) {
                alert("Group Address wajib diisi.");
                return;
            }

            if (!hostnameFormat) {
                alert("Format Hostname wajib diisi. Contoh: H_");
                return;
            }

            const lines = input
                .split(/\r?\n|,/)
                .map(item => item.trim())
                .filter(item => item !== "");

            const uniqueItems = [...new Set(lines)];

            const ipList = [];
            const cidrList = [];
            const domainList = [];

            uniqueItems.forEach(item => {
                if (isValidCIDR(item)) {
                    cidrList.push(item);
                } else if (isValidIP(item)) {
                    ipList.push(item);
                } else if (isDomain(item)) {
                    domainList.push(item.toLowerCase());
                }
            });

            cidrList.sort((a, b) => {
                const ipA = a.split('/')[0];
                const ipB = b.split('/')[0];
                return ipToNumber(ipA) - ipToNumber(ipB);
            });

            ipList.sort((a, b) => ipToNumber(a) - ipToNumber(b));
            domainList.sort();

            let output = "";

            output += `add group name "${groupName}"\n`;

            domainList.forEach(domain => {
                output += `add dns-domain name ".${domain}" is-sub-domain false\n`;
                output += `set group name "${groupName}" members.add ".${domain}"\n`;
            });

            cidrList.forEach(cidr => {
                const [ip, prefix] = cidr.split('/');
                const objectName = `${hostnameFormat}${ip}-m${prefix}`;

                output +=
                    `add network name "${objectName}" subnet ${ip} mask-length ${prefix} groups ${groupName}\n`;
            });

            ipList.forEach(ip => {

                const objectName = `${hostnameFormat}${ip}-m32`;

                output += `add host name "${objectName}" ip-address ${ip} groups ${groupName}\n`;
            });

            document.getElementById("checkpointObjectOutput").value = output;
        }

function copyCheckpointObjectOutput(button) {

    const output =
        document.getElementById("checkpointObjectOutput");

    if (!output.value.trim()) {
        return;
    }

    navigator.clipboard.writeText(output.value);

    showCopied(button, "Copy Output");
}

        function clearCheckpointObject() {
            document.getElementById("checkpointInput").value = "";
            document.getElementById("checkpointGroupAddress").value = "";
            document.getElementById("checkpointHostnameFormat").value = "";
            document.getElementById("checkpointObjectOutput").value = "";
        }
        // End Create Object Checkpoint

        function showCopied(button, originalText) {

            button.disabled = true;

            const oldClass = button.className;

            button.innerHTML = "✓ Copied";

            if (button.classList.contains("btn-success")) {
                button.classList.remove("btn-success");
                button.classList.add("btn-primary");
            }

            setTimeout(() => {

                button.innerHTML = originalText;
                button.className = oldClass;
                button.disabled = false;

            }, 1500);
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
